version: "3.8"

# Deploys 10 copies of the same bot, each with its own token, port,
# and MongoDB connection. All other settings come from the env files
# in ./env/ and are identical for every bot.
#
# Usage:
#   1. Fill in env/bot1.env ... env/bot10.env with each bot's
#      TG_BOT_TOKEN, PORT, DATABASE_URL and DATABASE_NAME.
#   2. docker compose up -d --build
#   3. docker compose logs -f bot1   (or any bot name)
#   4. docker compose down           (to stop all)

services:
  bot1:
    build: .
    container_name: filesharebot-1
    env_file: ./env/bot1.env
    ports:
      - "8081:8081"
    restart: unless-stopped

  bot2:
    build: .
    container_name: filesharebot-2
    env_file: ./env/bot2.env
    ports:
      - "8082:8082"
    restart: unless-stopped

